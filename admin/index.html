<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="/css/style.css">
  <!-- Maintenance redirect -->
  <script>
    (function() {
      if (window.location.pathname.startsWith('/maintenance')) return;
      fetch('/api/maintenance')
        .then(r => r.json())
        .then(d => { if (d.active) window.location.replace('/maintenance'); })
        .catch(() => {});
    })();
  </script>
  <style>
    #admin-content { display: none; }
  </style>
</head>
<body>
  <nav>
    <a href="/">🛒 Shop</a>
    <a href="/status">📡 Status</a>
    <a href="/admin">🔒 Admin</a>
  </nav>

  <div class="glass" id="login-form">
    <h2 style="margin-bottom:1rem;">Admin Login</h2>
    <div style="display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
      <input type="password" id="password" placeholder="Admin password">
      <button onclick="login()">Unlock</button>
    </div>
    <p id="login-error" style="color:#f87171; margin-top:0.5rem;"></p>
  </div>

  <div id="admin-content">
    <div class="glass">
      <h2>📊 Sales Dashboard</h2>
      <div style="display:flex; gap:2rem; flex-wrap:wrap; margin-top:1rem;">
        <div>
          <p style="color:#94a3b8;">Today</p>
          <p style="font-size:2rem; font-weight:700;">$142.00</p>
        </div>
        <div>
          <p style="color:#94a3b8;">This Week</p>
          <p style="font-size:2rem; font-weight:700;">$987.00</p>
        </div>
        <div>
          <p style="color:#94a3b8;">Total Orders</p>
          <p style="font-size:2rem; font-weight:700;">341</p>
        </div>
      </div>
      <button onclick="logout()" style="margin-top:1.5rem;">🔒 Lock Panel</button>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    async function login() {
      const password = document.getElementById('password').value;
      const res = await fetch(`${API_BASE}/api/login`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem('admin_token', data.token);
        showAdmin();
      } else {
        document.getElementById('login-error').textContent = data.error || 'Wrong password';
      }
    }

    function logout() {
      localStorage.removeItem('admin_token');
      showAdmin();
    }

    async function verifyToken() {
      const token = localStorage.getItem('admin_token');
      if (!token) return false;
      const res = await fetch(`${API_BASE}/api/login`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token })
      });
      return res.ok;
    }

    async function showAdmin() {
      const valid = await verifyToken();
      if (valid) {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('admin-content').style.display = 'block';
      } else {
        localStorage.removeItem('admin_token');
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('admin-content').style.display = 'none';
      }
    }

    showAdmin();
  </script>
</body>
</html>

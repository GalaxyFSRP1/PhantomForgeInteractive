<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .countdown {
      font-size: 2.5rem;
      font-weight: 700;
      margin: 1.5rem 0;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-message {
      color: #94a3b8;
      max-width: 500px;
    }
  </style>
</head>
<body>
  <div class="glass" style="max-width: 600px; width: 100%;">
    <h1>🔧 We'll be right back</h1>
    <p id="maint-message">Scheduled maintenance in progress.</p>
    <div class="countdown" id="countdown">--:--:--</div>
    <p class="status-message">Our shop, admin panel, and status pages are temporarily unavailable. <br>Thanks for your patience.</p>
  </div>

  <script>
    async function loadMaintenance() {
      try {
        const res = await fetch('/api/maintenance');
        const data = await res.json();
        if (data.message) {
          document.getElementById('maint-message').textContent = data.message;
        }
        if (data.endTime) {
          startCountdown(new Date(data.endTime));
        } else {
          document.getElementById('countdown').textContent = 'No end time set';
        }
      } catch(e) {
        document.getElementById('maint-message').textContent = 'Maintenance in progress.';
      }
    }

    function startCountdown(end) {
      function update() {
        const now = new Date();
        const diff = end - now;
        if (diff <= 0) {
          document.getElementById('countdown').textContent = 'Completed!';
          // optionally reload the page after maintenance ends
          setTimeout(() => window.location.reload(), 5000);
          return;
        }
        const hours = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        document.getElementById('countdown').textContent = 
          `${String(hours).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      }
      update();
      setInterval(update, 1000);
    }

    loadMaintenance();
  </script>
</body>
</html>
